apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
spec:
  type: NodePort
  selector:
    app: devops-web
  ports:
    - protocol: TCP
      port: 80         # Port the service exposes externally
      targetPort: 5000 # Port the container is listening on
      nodePort: 32000  # Maps the cluster node port for testing
